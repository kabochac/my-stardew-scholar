<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STARDEW SCHOLAR: KNOWLEDGE & INSPIRATION</title>
    <!-- 星露谷风格像素金南瓜图标 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' style='image-rendering:pixelated;'><path d='M7,1 h2 v2 h-2 z' fill='%234a2306'/><path d='M6,3 h4 v1 h-4 z' fill='%2327ae60'/><path d='M4,4 h8 v1 h-8 z' fill='%23d35400'/><path d='M2,5 h12 v2 h-12 z' fill='%23e67e22'/><path d='M1,7 h14 v5 h-14 z' fill='%23f39c12'/><path d='M2,12 h12 v1 h-12 z' fill='%23e67e22'/><path d='M4,13 h8 v1 h-8 z' fill='%23d35400'/><path d='M6,14 h4 v1 h-4 z' fill='%23ba4a00'/><path d='M5,7 h1 v4 h-1 zM10,7 h1 v4 h-1 z' fill='%23ba4a00'/></svg>">
    <!-- 引入复古像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Zpix&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --stardew-dark-brown: #3a1a05;
            --stardew-border-brown: #5c2e0b;
            --stardew-wood: #b9703b;
            --stardew-light-wood: #e1975b;
            --stardew-paper: #fbf0cf;
            --stardew-paper-border: #966137;
            --stardew-text: #4a2306;
            --stardew-blue: #2c72b3;
            --stardew-purple: #8e44ad;
            --stardew-red: #b33939;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            image-rendering: pixelated;
        }

        body { 
            font-family: 'Zpix', 'PingFang SC', sans-serif; 
            background-color: #2b1d15;
            background-image: linear-gradient(rgba(0, 0, 0, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 0, 0, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--stardew-text); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }

        .container { 
            width: 100%; 
            max-width: 850px; 
            background: var(--stardew-wood);
            border: 6px solid var(--stardew-dark-brown);
            box-shadow: 
                inset -6px -6px 0px var(--stardew-border-brown),
                inset 6px 6px 0px var(--stardew-light-wood),
                0px 8px 0px rgba(0,0,0,0.4);
            border-radius: 4px;
            padding: 25px;
        }

        h1 { 
            font-family: 'Press Start 2P', 'Zpix', sans-serif;
            font-size: 13px; 
            text-align: center; 
            background: var(--stardew-paper);
            color: var(--stardew-dark-brown);
            padding: 12px 6px;
            border: 4px solid var(--stardew-dark-brown);
            box-shadow: inset -4px -4px 0px #c2b280, 0 4px 0px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #fff;
            text-shadow: 2px 2px 0px var(--stardew-dark-brown);
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: -4px;
            position: relative;
            z-index: 2;
        }
        .tab-button {
            background: #a25c2c;
            color: #fff;
            border: 4px solid var(--stardew-dark-brown);
            border-bottom: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 4px 4px 0px #c57d4a;
        }
        .tab-button.active {
            background: var(--stardew-paper);
            color: var(--stardew-dark-brown);
            box-shadow: inset 4px 4px 0px #fff;
            padding-bottom: 14px;
        }

        .section { 
            background: #a25c2c; 
            padding: 20px; 
            border: 4px solid var(--stardew-dark-brown);
            box-shadow: inset -4px -4px 0px #7d441e, inset 4px 4px 0px #c57d4a;
            margin-bottom: 20px; 
            position: relative;
            z-index: 1;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .grid-input { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 12px; 
        }

        .url-fetch-group {
            display: flex;
            gap: 10px;
            grid-column: span 3;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            background: var(--stardew-paper);
            border: 3px solid var(--stardew-paper-border);
            color: var(--stardew-dark-brown);
            font-family: inherit;
            font-size: 15px; 
            font-weight: bold;
            outline: none; 
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }
        textarea { height: 100px; resize: none; }
        input:focus, textarea:focus { background: #fff; border-color: var(--stardew-dark-brown); }
        .span-2 { grid-column: span 2; }
        .span-3 { grid-column: span 3; }
        
        .flex-actions { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px; 
        }
        
        .btn { 
            background: #f3a73c; 
            color: var(--stardew-dark-brown); 
            border: 4px solid var(--stardew-dark-brown); 
            padding: 10px 24px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: inset -4px -4px 0px #c67a13, inset 4px 4px 0px #ffc97a, 0 4px 0 rgba(0,0,0,0.3);
        }
        .btn:hover { background: #ffb84d; }
        .btn:active { transform: translateY(2px); box-shadow: inset 4px 4px 0px #c67a13, 0 2px 0 rgba(0,0,0,0.3); }
        
        .btn-sm { padding: 6px 12px; font-size: 13px; background: #78e08f; box-shadow: inset -3px -3px 0px #38a169, inset 3px 3px 0px #bbf7d0, 0 3px 0 rgba(0,0,0,0.2); margin-left: 5px; }
        .btn-sm.export { background: #60a5fa; box-shadow: inset -3px -3px 0px #2563eb, inset 3px 3px 0px #bfdbfe, 0 3px 0 rgba(0,0,0,0.2); }
        .btn-sm.fetch { background: #eccc68; box-shadow: inset -3px -3px 0px #b38f2e, inset 3px 3px 0px #f7e19a, 0 3px 0 rgba(0,0,0,0.2); white-space: nowrap; }

        .controls { 
            display: flex; gap: 15px; margin-bottom: 25px; align-items: center; 
            background: #8e4f23; padding: 12px; border: 3px solid var(--stardew-dark-brown);
        }
        .controls label { color: white; font-weight: bold; text-shadow: 1px 1px 0 var(--stardew-dark-brown); }

        #importFile { display: none; }

        .item-list { display: flex; flex-direction: column; gap: 14px; }
        .item-card { 
            background: var(--stardew-paper); padding: 18px; border: 4px solid var(--stardew-paper-border);
            box-shadow: inset -3px -3px 0px #e5d7ad, 0 4px 0 rgba(0,0,0,0.2);
            display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; 
        }
        
        .citation-text { font-size: 16px; line-height: 1.6; color: var(--stardew-dark-brown); margin-bottom: 10px; font-weight: bold; }
        .idea-text { font-size: 16px; line-height: 1.5; color: #2c3e50; white-space: pre-wrap; margin-bottom: 10px; font-weight: bold; }

        .item-meta { font-size: 13px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .item-link { color: var(--stardew-blue); text-decoration: none; font-weight: bold; }

        .delete-btn { 
            background: #e74c3c; color: white; border: 3px solid var(--stardew-dark-brown); font-weight: bold;
            cursor: pointer; padding: 6px 14px; box-shadow: inset -3px -3px 0px #c0392b, 0 3px 0 rgba(0,0,0,0.2);
        }
        
        .tag { background: #4cd137; color: #fff; padding: 3px 8px; border: 2px solid var(--stardew-dark-brown); font-size: 12px; font-weight: bold; }
        .tag.idea-tag { background: #9b59b6; }
        .highlight { background-color: #fffa65; border-bottom: 2px solid #fff200; }
        .hint-text { color: #ffd27d; font-weight: bold; text-shadow: 1px 1px 0 var(--stardew-dark-brown); }
    </style>
</head>
<body>

<div class="container">
    <h1>🌾 Stardew Valley: Knowledge & Inspiration Centre 🌾</h1>
    
    <div class="tab-container">
        <button class="tab-button active" onclick="switchTab('literature')">📦 文献背包</button>
        <button class="tab-button" onclick="switchTab('ideas')">🔮 灵感秘境</button>
    </div>

    <div class="section">
        <!-- 面板1：文献录入 -->
        <div id="panel-literature" class="tab-panel active">
            <!-- 粗暴文本一次性打磨熔炼栏 -->
            <div style="background: #8e4f23; padding: 12px; border: 3px solid var(--stardew-dark-brown); margin-bottom: 15px; box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2);">
                <span class="hint-text" style="display:block; margin-bottom:6px; font-size:14px; color:#ffd27d;">⚙️ 粗暴文本一次性打磨机（扔进不规范人名/期刊信息直接生成标准条）：</span>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="rawCitationText" placeholder="把不规范的人名、书名、出版社或抓取的零散引用直接粘在这里（例如：张三, 2026, 论草莓种植, 鹈鹕镇农业杂志）">
                    <button class="btn btn-sm fetch" style="background: #9b59b6; box-shadow: inset -3px -3px 0px #6d318c, inset 3px 3px 0px #c586e2, 0 3px 0 rgba(0,0,0,0.3); padding:0 15px;" onclick="parseRawCitation()">🪄 熔炼提纯</button>
                </div>
            </div>

            <div class="grid-input">
                <div class="url-fetch-group">
                    <input type="text" id="url" placeholder="粘贴网址 URL (可选)">
                    <button class="btn btn-sm fetch" onclick="autoFetchUrl()">🧙‍♂️ 魔法解析网址</button>
                </div>
                <input type="text" id="author" placeholder="作者 Writer / Author (例: Smith, J. 或 张三)">
                <input type="text" id="editor" placeholder="编者 Editor (可选)">
                <input type="text" id="translator" placeholder="译者 Translator (可选)">
                
                <input type="text" id="title" class="span-2" placeholder="文献/文章/书籍标题 Title">
                <input type="text" id="year" placeholder="出版年份 Year (如: 2026)">
                
                <input type="text" id="source" class="span-2" placeholder="期刊名 / 出版社 / 网站名称 Source Container">
                <input type="text" id="pages" placeholder="页码范围 Pages (如: 45-67，可选)">
            </div>
            <div class="flex-actions">
                <span class="hint-text">💡 提示：打磨熔炼后信息会自动分装在上方，点击右侧按钮立刻打入背包！</span>
                <button class="btn" onclick="addLiterature()">RECORD LITERATURE</button>
            </div>
        </div>

        <!-- 面板2：灵感录入 -->
        <div id="panel-ideas" class="tab-panel">
            <div class="grid-input">
                <textarea id="ideaContent" class="span-3" placeholder="在这里写下你的零散想法、关键词、读书心得或突然蹦出来的灵感..."></textarea>
                <input type="text" id="ideaTags" class="span-3" placeholder="给灵感打上标签，用逗号隔开 (例如: 论文选题, 创作灵感, 工作想法)">
            </div>
            <div class="flex-actions">
                <span class="hint-text">💡 提示：灵感也是珍贵的作物，记得及时收割。支持随时归档保存。</span>
                <button class="btn" style="background:#9b59b6; box-shadow: inset -4px -4px 0px #6d318c, inset 4px 4px 0px #c586e2, 0 4px 0 rgba(0,0,0,0.3);" onclick="addIdea()">HARVEST IDEA</button>
            </div>
        </div>
    </div>

    <!-- 全局控制中心 -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h2>🎒 全局检索与存档</h2>
        <div>
            <button class="btn btn-sm export" onclick="exportData()">💾 导出全部数据</button>
            <button class="btn btn-sm" onclick="triggerImport()">🎒 导入备份恢复</button>
            <input type="file" id="importFile" accept=".txt" onchange="importData(this)">
        </div>
    </div>
    
    <div class="controls">
        <input type="text" id="searchBar" placeholder="🔍 开启全局雷达：输入任意关键词检索文献与灵感..." oninput="renderAll()">
        
        <!-- 灵感仓库专属的 Archive 检索筛选控制器 -->
        <div id="archive-toggle-wrapper" style="display: none; align-items: center; gap: 5px; white-space: nowrap; background: #a25c2c; padding: 6px 10px; border: 3px solid var(--stardew-dark-brown);">
            <input type="checkbox" id="showArchived" style="width: auto; margin: 0; cursor: pointer;" onchange="renderAll()">
            <label for="showArchived" style="color: white; font-weight: bold; text-shadow: 1px 1px 0 var(--stardew-dark-brown); cursor: pointer; font-size: 14px;">📦 包含已归档灵感</label>
        </div>

        <div id="citation-select-wrapper" style="display: flex; align-items: center; gap: 5px;">
            <label for="formatSelect">COLOUR / FORMAT:</label>
            <select id="formatSelect" style="padding: 6px; width: 160px;" onchange="renderAll()">
                <option value="APA">APA 7th 最新版</option>
                <option value="MLA">MLA 9th 最新版</option>
                <option value="Chicago">Chicago 17th (作者-书目)</option>
                <option value="GB">GB/T 7714-2015 (国标)</option>
            </select>
        </div>
    </div>

    <!-- 综合收纳箱 -->
    <h2 id="list-heading">📋 综合收纳箱</h2>
    <div class="item-list" id="itemList"></div>
</div>

<script>
    let articles = JSON.parse(localStorage.getItem('my_academic_papers')) || [];
    let ideas = JSON.parse(localStorage.getItem('my_stardew_ideas')) || [];
    let currentTab = 'literature';

    function cleanLegacyData() {
        let changed = false;
        articles = articles.map(item => {
            if (!item.type) { item.type = 'literature'; changed = true; }
            if (!item.id) { item.id = Date.now() + Math.random(); changed = true; }
            return item;
        });
        ideas = ideas.map(item => {
            if (item.archived === undefined) { item.archived = false; changed = true; }
            return item;
        });
        if (changed) { 
            localStorage.setItem('my_academic_papers', JSON.stringify(articles)); 
            localStorage.setItem('my_stardew_ideas', JSON.stringify(ideas));
        }
    }
    cleanLegacyData();

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        
        if (tab === 'literature') {
            document.querySelectorAll('.tab-button')[0].classList.add('active');
            document.getElementById('panel-literature').classList.add('active');
            document.getElementById('citation-select-wrapper').style.display = 'flex';
            document.getElementById('archive-toggle-wrapper').style.display = 'none';
        } else {
            document.querySelectorAll('.tab-button')[1].classList.add('active');
            document.getElementById('panel-ideas').classList.add('active');
            document.getElementById('citation-select-wrapper').style.display = 'none';
            document.getElementById('archive-toggle-wrapper').style.display = 'flex';
        }
        renderAll();
    }

    function parseRawCitation() {
        const raw = document.getElementById('rawCitationText').value.trim();
        if (!raw) { alert('🧙‍♂️ 巫师提示：熔炼炉空空如也，请先粘贴不规范的文本！'); return; }
        
        ['author','editor','translator','year','title','source','pages'].forEach(id => document.getElementById(id).value = '');

        const yearMatch = raw.match(/(19\d\d|20[0-2]\d|2030)/);
        let year = yearMatch ? yearMatch[0] : '';
        
        const pagesMatch = raw.match(/(\d+[-—~]\d+)\s*(页|p|pages)?/i) || raw.match(/(第?\s*\d+\s*页)/) || raw.match(/(p\.\s*\d+)/i);
        let pages = '';
        if (pagesMatch) {
            pages = pagesMatch[1] || pagesMatch[0];
            pages = pages.replace(/[第页p.]/gi, '').trim();
        }
        
        let cleanRaw = raw;
        if (year) cleanRaw = cleanRaw.replace(yearMatch[0], '');
        if (pagesMatch) cleanRaw = cleanRaw.replace(pagesMatch[0], '');
        cleanRaw = cleanRaw.replace(/(\s*年\s*|\s*页\s*)/g, ' ');
        
        let parts = cleanRaw.split(/[.,，。;；|/\"'“”《》\[\]]/).map(p => p.trim()).filter(p => p.length > 0);
        
        let author = '';
        let title = '';
        let source = '';
        
        if (parts.length >= 3) {
            let longestIdx = 0;
            for (let i = 1; i < parts.length; i++) {
                if (parts[i].length > parts[longestIdx].length) longestIdx = i;
            }
            title = parts[longestIdx];
            
            let beforeParts = parts.slice(0, longestIdx);
            let afterParts = parts.slice(longestIdx + 1);
            
            if (beforeParts.length > 0) author = beforeParts.join(', ');
            if (afterParts.length > 0) source = afterParts.join(', ');
        } else if (parts.length === 2) {
            if (parts[0].length > parts[1].length) { title = parts[0]; author = parts[1]; }
            else { title = parts[1]; author = parts[0]; }
        } else if (parts.length === 1) {
            title = parts[0];
        }
        
        if (author) document.getElementById('author').value = author;
        if (year) document.getElementById('year').value = year;
        if (title) document.getElementById('title').value = title;
        if (source) document.getElementById('source').value = source;
        if (pages) document.getElementById('pages').value = pages;
        
        alert('✨ 熔炼提纯完毕！已分装，请检查确认后点击下方 [RECORD LITERATURE] 生成标准行。');
    }

    function autoFetchUrl() {
        const urlInput = document.getElementById('url').value.trim();
        if (!urlInput) { alert('🧙‍♂️ 巫师提示：请先粘贴一个有效的网址！'); return; }
        
        const fetchBtn = document.querySelector('.btn.fetch');
        fetchBtn.innerText = '正在施法抓取...';
        fetchBtn.disabled = true;

        fetch(`https://api.microlink.io?url=${encodeURIComponent(urlInput)}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success' && data.data) {
                    const meta = data.data;
                    document.getElementById('title').value = meta.title || '';
                    document.getElementById('source').value = meta.publisher || '';
                    if (meta.date) {
                        const dateObj = new Date(meta.date);
                        document.getElementById('year').value = !isNaN(dateObj.getFullYear()) ? dateObj.getFullYear() : meta.date.slice(0,4);
                    } else {
                        document.getElementById('year').value = new Date().getFullYear();
                    }
                    document.getElementById('author').value = meta.author || '';
                    alert('✨ 魔法成功！已自动填入部分抓取信息，请检查和微调。');
                } else {
                    alert('💨 魔法半失效：未检测到完整元数据。已自动填入出处。');
                    document.getElementById('year').value = new Date().getFullYear();
                    document.getElementById('source').value = new URL(urlInput).hostname;
                }
            })
            .catch(() => {
                alert('💨 魔法失效：网络超时。已为你智能填充出处。');
                document.getElementById('source').value = new URL(urlInput).hostname;
                document.getElementById('year').value = new Date().getFullYear();
            })
            .finally(() => {
                fetchBtn.innerText = '🧙‍♂️ 魔法解析网址';
                fetchBtn.disabled = false;
            });
    }

    function addLiterature() {
        const title = document.getElementById('title').value.trim();
        if (!title) { alert('请至少填写文献标题！'); return; }

        articles.unshift({
            id: Date.now(),
            type: 'literature',
            author: document.getElementById('author').value.trim() || 'Unknown Author',
            editor: document.getElementById('editor').value.trim(),
            translator: document.getElementById('translator').value.trim(),
            year: document.getElementById('year').value.trim() || 'n.d.',
            title: title,
            source: document.getElementById('source').value.trim() || '',
            pages: document.getElementById('pages').value.trim(),
            url: document.getElementById('url').value.trim()
        });
        localStorage.setItem('my_academic_papers', JSON.stringify(articles));
        renderAll();
        
        ['url','author','editor','translator','year','title','source','pages','rawCitationText'].forEach(id => document.getElementById(id).value = '');
    }

    function addIdea() {
        const content = document.getElementById('ideaContent').value.trim();
        if (!content) { alert('灵感不能空着收割喔！'); return; }

        ideas.unshift({
            id: Date.now(),
            type: 'idea',
            content: content,
            tags: document.getElementById('ideaTags').value.trim() || '随笔',
            archived: false
        });
        localStorage.setItem('my_stardew_ideas', JSON.stringify(ideas));
        renderAll();

        document.getElementById('ideaContent').value = '';
        document.getElementById('ideaTags').value = '';
    }

    function toggleArchiveIdea(id) {
        ideas = ideas.map(item => {
            if (item.id === id) item.archived = !item.archived;
            return item;
        });
        localStorage.setItem('my_stardew_ideas', JSON.stringify(ideas));
        renderAll();
    }

    function deleteItem(id, type) {
        if(confirm('确定要把这个物品从收纳箱中彻底丢弃吗？')) {
            if (type === 'literature') {
                articles = articles.filter(a => a.id !== id);
                localStorage.setItem('my_academic_papers', JSON.stringify(articles));
            } else {
                ideas = ideas.filter(i => i.id !== id);
                localStorage.setItem('my_stardew_ideas', JSON.stringify(ideas));
            }
            renderAll();
        }
    }

    // 核心重构：实现严谨的最新版学术引用标准规则
    function generateCitation(item, format) {
        let authStr = (item.author || 'Unknown Author').trim();
        let yearStr = (item.year || 'n.d.').trim();
        let titleStr = (item.title || 'Untitled').trim();
        let sourceStr = (item.source || '').trim();
        let pagesStr = (item.pages || '').trim();
        let urlStr = (item.url || '').trim();

        // 去除尾部句号，防止双重标点
        if (authStr.endsWith('.')) authStr = authStr.slice(0, -1);
        if (sourceStr.endsWith('.')) sourceStr = sourceStr.slice(0, -1);
        if (titleStr.endsWith('.')) titleStr = titleStr.slice(0, -1);

        switch(format) {
            case 'APA': // APA 第 7 版最新标准 (American Psychological Association 7th Edition)
                // 规则：作者. (年份). 标题. [期刊/容器则斜体]. 页码. 网址. (APA7全面取消了图书出版地)
                let apaMeta = [];
                if (item.editor) apaMeta.push(`${item.editor}, Ed.`);
                if (item.translator) apaMeta.push(`${item.translator}, Trans.`);
                let apaMetaStr = apaMeta.length > 0 ? ` (${apaMeta.join('; ')})` : '';
                
                let apaPages = pagesStr ? `, ${pagesStr}` : '';
                let apaUrl = urlStr ? ` ${urlStr}` : '';
                
                if (sourceStr) {
                    // 期刊或文章模式
                    return `${authStr}. (${yearStr}). ${titleStr}${apaMetaStr}. <i>${sourceStr}</i>${apaPages}.${apaUrl}`;
                } else {
                    // 独立书籍模式
                    return `${authStr}. (${yearStr}). <i>${titleStr}</i>${apaMetaStr}.${apaPages ? ' ' + pagesStr + '.' : ''}${apaUrl}`;
                }
                
            case 'MLA': // MLA 第 9 版最新标准 (Modern Language Association 9th Edition)
                // 规则：作者. "标题." 斜体容器(期刊/出版社), 贡献者, 年份, pp. 页码. 网址.
                let mlaContributors = [];
                if (item.editor) mlaContributors.push(`edited by ${item.editor}`);
                if (item.translator) mlaContributors.push(`translated by ${item.translator}`);
                let mlaContribStr = mlaContributors.length > 0 ? `, ${mlaContributors.join(', ')}` : '';
                
                let mlaPages = pagesStr ? `, pp. ${pagesStr}` : '';
                let mlaUrl = urlStr ? `, ${urlStr}` : '';
                
                if (sourceStr) {
                    return `${authStr}. "${titleStr}." <i>${sourceStr}</i>${mlaContribStr}, ${yearStr}${mlaPages}${mlaUrl}.`;
                } else {
                    return `${authStr}. <i>${titleStr}</i>${mlaContribStr}, ${yearStr}${mlaPages}${mlaUrl}.`;
                }
                
            case 'Chicago': // Chicago 第 17 版最新标准 (Notes & Bibliography 经典文献列表格式)
                // 规则：作者. "文章名." 斜体期刊/出版社 (年份): 页码. 网址.
                let chiMeta = [];
                if (item.translator) chiMeta.push(`translated by ${item.translator}`);
                if (item.editor) chiMeta.push(`edited by ${item.editor}`);
                let chiMetaStr = chiMeta.length > 0 ? ` ${chiMeta.join('. ')}.` : '';
                
                let chiPages = pagesStr ? `: ${pagesStr}` : '';
                let chiUrl = urlStr ? ` ${urlStr}.` : '';
                
                if (sourceStr) {
                    return `${authStr}. "${titleStr}." <i>${sourceStr}</i>${chiMetaStr} (${yearStr})${chiPages}.${chiUrl}`;
                } else {
                    return `${authStr}. <i>${titleStr}</i>.${chiMetaStr} ${yearStr}${chiPages}.${chiUrl}`;
                }
                
            case 'GB': // 中国国标 GB/T 7714-2015 
                let gbMeta = [];
                if (item.editor) gbMeta.push(`${item.editor}, 编`);
                if (item.translator) gbMeta.push(`${item.translator}, 译`);
                let gbMetaStr = gbMeta.length > 0 ? `. ${gbMeta.join(', ')}` : '';
                
                let gbPages = pagesStr ? `: ${pagesStr}` : '';
                let gbUrl = urlStr ? `. ${urlStr}` : '';
                let gbSource = sourceStr ? `. ${sourceStr}` : '';
                
                return `${authStr}. ${titleStr}${gbMetaStr}${gbSource}, ${yearStr}${gbPages}${gbUrl}.`;
        }
    }

    function renderAll() {
        const keyword = document.getElementById('searchBar').value.trim().toLowerCase();
        const currentFormat = document.getElementById('formatSelect').value;
        const showArchived = document.getElementById('showArchived').checked;
        const listEl = document.getElementById('itemList');
        listEl.innerHTML = '';

        const filteredArticles = articles.filter(item => 
            (item.author || '').toLowerCase().includes(keyword) || (item.title || '').toLowerCase().includes(keyword) || 
            (item.source || '').toLowerCase().includes(keyword) || (item.year || '').includes(keyword) ||
            (item.editor || '').toLowerCase().includes(keyword) || (item.translator || '').toLowerCase().includes(keyword)
        );

        const filteredIdeas = ideas.filter(item => {
            const matchKeyword = (item.content || '').toLowerCase().includes(keyword) || (item.tags || '').toLowerCase().includes(keyword);
            if (!showArchived && item.archived) return false;
            return matchKeyword;
        });

        document.getElementById('list-heading').innerText = keyword 
            ? `📡 全局雷达结果 (文献:${filteredArticles.length} | 灵感:${filteredIdeas.length})`
            : (currentTab === 'literature' ? `🎒 文献背包 (${articles.length})` : `🔮 灵感仓库 (${filteredIdeas.length})`);

        let displayList = [];
        if (keyword) {
            displayList = [...filteredArticles, ...filteredIdeas].sort((a,b) => b.id - a.id);
        } else {
            displayList = (currentTab === 'literature') ? articles : filteredIdeas;
        }

        if (displayList.length === 0) {
            listEl.innerHTML = '<div style="text-align:center; color:#fff; text-shadow:1px 1px 0 var(--stardew-dark-brown); padding:20px;">此区域空空如也</div>';
            return;
        }

        displayList.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';

            if (item.type === 'literature') {
                let htmlStr = generateCitation(item, currentFormat);
                if (keyword) htmlStr = htmlStr.replace(new RegExp(`(${keyword})`, 'gi'), '<span class="highlight">$1</span>');
                let urlHTML = item.url ? `<a href="${item.url}" target="_blank" class="item-link">🌐 OPEN LINK</a>` : '<span style="color:#a25c2c;">NO LINK</span>';

                card.innerHTML = `
                    <div style="flex: 1;">
                        <div class="citation-text">${htmlStr}</div>
                        <div class="item-meta">
                            <span class="tag" style="background:#2c72b3;">${currentFormat} 最新版</span>
                            ${urlHTML}
                            <span style="color:var(--stardew-paper-border); font-weight:bold;">Harvested: ${new Date(item.id).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${item.id}, 'literature')">DELETE</button>
                `;
            } else {
                let contentStr = item.content;
                let tagsStr = item.tags;
                if (keyword) {
                    contentStr = contentStr.replace(new RegExp(`(${keyword})`, 'gi'), '<span class="highlight">$1</span>');
                    tagsStr = tagsStr.replace(new RegExp(`(${keyword})`, 'gi'), '<span class="highlight">$1</span>');
                }

                let archiveBtnText = item.archived ? '🎒 取消归档' : '📦 归档灵感';
                let archiveBtnStyle = item.archived 
                    ? 'background: #7f8c8d; box-shadow: inset -3px -3px 0px #5c6366, 0 3px 0 rgba(0,0,0,0.2); color: #fff;' 
                    : 'background: #eccc68; box-shadow: inset -3px -3px 0px #b38f2e, 0 3px 0 rgba(0,0,0,0.2); color: var(--stardew-dark-brown);';
                if (item.archived) { card.style = "background: #dcdde1; opacity: 0.75;"; }
                let archivedBadge = item.archived ? '<span class="tag" style="background:#7f8c8d; margin-right:5px;">📦 已归档</span>' : '';

                card.innerHTML = `
                    <div style="flex: 1;">
                        <div class="idea-text">💭 ${contentStr}</div>
                        <div class="item-meta">
                            ${archivedBadge}
                            <span class="tag idea-tag">🔮 灵感</span>
                            <span style="color:#7f8c8d; font-weight:bold;">🔖 标签: ${tagsStr}</span>
                            <span style="color:var(--stardew-paper-border); font-weight:bold;">Recorded: ${new Date(item.id).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="delete-btn" style="${archiveBtnStyle} border:3px solid var(--stardew-dark-brown);" onclick="toggleArchiveIdea(${item.id})">${archiveBtnText}</button>
                        <button class="delete-btn" onclick="deleteItem(${item.id}, 'idea')">DELETE</button>
                    </div>
                `;
            }
            listEl.appendChild(card);
        });
    }

    function exportData() {
        const allData = { articles, ideas };
        const blob = new Blob([JSON.stringify(allData, null, 2)], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `stardew_all_data_backup_${new Date().toISOString().slice(0,10)}.txt`;
        link.click();
    }

    function triggerImport() { document.getElementById('importFile').click(); }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const backup = JSON.parse(e.target.result);
                if (backup.articles || backup.ideas) {
                    if (confirm('检测到全量备份数据！是否导入？')) {
                        articles = backup.articles || [];
                        ideas = backup.ideas || [];
                        localStorage.setItem('my_academic_papers', JSON.stringify(articles));
                        localStorage.setItem('my_stardew_ideas', JSON.stringify(ideas));
                        cleanLegacyData();
                        renderAll();
                    }
                } else { alert('文件格式不匹配。'); }
            } catch { alert('读取失败。'); }
            input.value = '';
        };
        reader.readAsText(file);
    }

    renderAll();
</script>
