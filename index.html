    <style>
        :root {
            --stardew-dark-brown: #3a1a05;
            --stardew-border-brown: #5c2e0b;
            --stardew-wood: #b9703b;
            --stardew-light-wood: #e1975b;
            --stardew-paper: #fbf0cf;
            --stardew-paper-border: #966137;
            --stardew-text: #4a2306;
            --stardew-blue: #2c72b3;
            --stardew-purple: #8e44ad;
            --stardew-red: #b33939;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            image-rendering: pixelated;
        }

        body { 
            font-family: 'Zpix', 'PingFang SC', sans-serif; 
            background-color: #2b1d15;
            background-image: linear-gradient(rgba(0, 0, 0, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 0, 0, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--stardew-text); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }

        .container { 
            width: 100%; 
            max-width: 850px; 
            background: var(--stardew-wood);
            border: 6px solid var(--stardew-dark-brown);
            box-shadow: 
                inset -6px -6px 0px var(--stardew-border-brown),
                inset 6px 6px 0px var(--stardew-light-wood),
                0px 8px 0px rgba(0,0,0,0.4);
            border-radius: 4px;
            padding: 25px;
        }

        h1 { 
            font-family: 'Press Start 2P', 'Zpix', sans-serif;
            font-size: 16px; 
            text-align: center; 
            background: var(--stardew-paper);
            color: var(--stardew-dark-brown);
            padding: 12px;
            border: 4px solid var(--stardew-dark-brown);
            box-shadow: inset -4px -4px 0px #c2b280, 0 4px 0px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #fff;
            text-shadow: 2px 2px 0px var(--stardew-dark-brown);
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: -4px;
            position: relative;
            z-index: 2;
        }
        .tab-button {
            background: #a25c2c;
            color: #fff;
            border: 4px solid var(--stardew-dark-brown);
            border-bottom: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 4px 4px 0px #c57d4a;
        }
        .tab-button.active {
            background: var(--stardew-paper);
            color: var(--stardew-dark-brown);
            box-shadow: inset 4px 4px 0px #fff;
            padding-bottom: 14px;
        }
